<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tímaverkefni í grid</title>
    <link rel="stylesheet" href="timaverkefniStyles.css" />
  </head>
  <body>
    <!-- Dæmi 1: NOTA grid-template-areas -->
    <div class="example-container">
      <div class="wrapper wrapper1">
        <div class="box a">A</div>
        <div class="box b">B</div>
        <div class="box c">C</div>
        <div class="box d">D</div>
      </div>
      <img src="example1.png" alt="Dæmi 1: grid-template-areas skipan" />
    </div>
    <h2>Dæmi 1: NOTA grid-template-areas</h2>

    <!-- Dæmi 2: NOTA grid-column-start/end og grid-row-start/end -->
    <div class="example-container">
      <div class="wrapper wrapper2">
        <div class="box a">A</div>
        <div class="box b">B</div>
        <div class="box c">C</div>
        <div class="box d">D</div>
      </div>
      <img
        src="example2.png"
        alt="Dæmi 2: grid-column-start/end & grid-row-start/end skipan"
      />
    </div>
    <h2>Dæmi 2: NOTA grid-column-start/end & grid-row-start/end</h2>

    <!-- Dæmi 3: NOTA grid-column og grid-row shorthand -->
    <div class="example-container">
      <div class="wrapper wrapper3">
        <div class="box a">A</div>
        <div class="box b">B</div>
        <div class="box c">C</div>
        <div class="box d">D</div>
      </div>
      <img
        src="example3.png"
        alt="Dæmi 3: grid-column & grid-row shorthand skipan"
      />
    </div>
    <h2>Dæmi 3: NOTA grid-column & grid-row shorthand</h2>

    <!-- Dæmi 4: NOTA grid-area shorthand -->
    <div class="example-container">
      <div class="wrapper wrapper4">
        <div class="box a">A</div>
        <div class="box b">B</div>
        <div class="box c">C</div>
        <div class="box d">D</div>
      </div>
      <img src="example4.png" alt="Dæmi 4: grid-area shorthand skipan" />
    </div>
    <h2>Dæmi 4: NOTA grid-area shorthand</h2>
  </body>
</html>
